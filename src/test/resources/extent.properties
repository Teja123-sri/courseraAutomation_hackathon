# extent.properties — configures the ExtentReports Cucumber7 adapter.
# This file must be at the root of the classpath (src/test/resources/).

# Output folder for Extent HTML report
extent.reporter.spark.start=true
extent.reporter.spark.out=reports/extent/ExtentReport.html

# Report title
extent.reporter.spark.config.report.name=Coursera BDD Automation Report
extent.reporter.spark.config.document.title=Coursera Test Report
extent.reporter.spark.config.theme=dark
extent.reporter.spark.config.encoding=UTF-8

# Enable screenshots for failed steps
screenshot.dir=screenshots/
screenshot.rel.path=../../screenshots/
